      { d:"medium", q:"Что такое функциональное программирование?", opts:["Программирование с функциями","Парадигма: чистые функции, неизменяемые данные, функции как значения — без побочных эффектов","Параллельное программирование","Объектно-ориентированное программирование"], a:1, exp:"ФП: чистые функции (нет побочных эффектов, детерминированы), иммутабельность, функции высшего порядка (map/filter/reduce). Примеры: Haskell, Clojure. Элементы в Python, JS, Scala." },
      { d:"medium", q:"Что такое Big O нотация в контексте программирования?", opts:["Тип комментария","Обозначение верхней границы временной/пространственной сложности алгоритма","Версия API","Тип ошибки"], a:1, exp:"Big O: описывает, как растёт время/память с ростом n. O(1) < O(log n) < O(n) < O(n log n) < O(n²) < O(2^n). Позволяет сравнивать алгоритмы независимо от железа." },
      { d:"medium", q:"Что такое тест-драйвен разработка (TDD)?", opts:["Разработка без тестирования","Методология: сначала пишут тесты, затем код, затем рефакторинг (Red-Green-Refactor)","Тестирование после деплоя","Тестирование пользователями"], a:1, exp:"TDD: Red (тест падает — функционал не реализован) → Green (пишем минимальный код для прохождения теста) → Refactor (улучшаем код). Обеспечивает 100% покрытие, архитектуру «от потребностей»." },
      { d:"medium", q:"Dependency Injection (DI) — это:", opts:["Тип цикла","Передача зависимостей объекту извне, а не создание их внутри","Метод оптимизации","Паттерн репозитория"], a:1, exp:"DI: объект не создаёт свои зависимости сам — они передаются через конструктор/метод/свойство. Делает код тестируемым (mock-объекты), уменьшает связность. Основа IoC-контейнеров." },
      { d:"medium", q:"Что такое рефакторинг?", opts:["Переписать программу с нуля","Изменение структуры кода без изменения внешнего поведения для улучшения читаемости/поддерживаемости","Добавление новых функций","Исправление ошибок"], a:1, exp:"Рефакторинг (Фаулер): улучшение внутренней структуры кода без изменения поведения. Техники: Extract Method, Rename Variable, Replace Conditional with Polymorphism и т.д. Непрерывный процесс." },
      { d:"hard", q:"Что такое монада в функциональном программировании?", opts:["Тип числа","Контейнер с операциями bind (>>=) и return/unit, удовлетворяющий законам монад","Вид цикла","Паттерн ООП"], a:1, exp:"Монада: конструкция для цепочки вычислений с контекстом (Maybe/Option для null-safety, Either для ошибок, IO для побочных эффектов). Законы: левое/правое тождество, ассоциативность." },
      { d:"hard", q:"Что такое CPS (Continuation Passing Style)?", opts:["Тип рекурсии","Стиль программирования, где результат передаётся явным callback (продолжением) вместо возврата","Тип оптимизации компилятора","Паттерн проектирования"], a:1, exp:"CPS: каждая функция принимает дополнительный аргумент — продолжение (callback). Позволяет явно управлять потоком, реализовывать корутины, оптимизировать хвостовые вызовы." },
      { d:"hard", q:"Что такое «ленивые вычисления» (lazy evaluation)?", opts:["Медленные вычисления","Стратегия: выражение вычисляется только тогда, когда его значение действительно нужно","Кэширование результатов","Параллельные вычисления"], a:1, exp:"Lazy evaluation (Haskell, Kotlin sequences): значение вычисляется только при первом использовании. Позволяет работать с бесконечными структурами, избегать лишних вычислений, улучшать производительность." },{ d:"hard", q:"Что такое trampolining в программировании?", opts:["Тип анимации","Техника преобразования рекурсивных вызовов в итерацию для предотвращения переполнения стека","Метод оптимизации памяти","Тип компилятора"], a:1, exp:"Trampolining: вместо прямого рекурсивного вызова функция возвращает thunk (лямбду). Внешний цикл (trampoline) вызывает thunks по очереди, обходя ограничение стека. Альтернатива TCO." },
      { d:"hard", q:"Что такое линейные типы (Linear Types)?", opts:["Типы для линейных структур данных","Система типов, гарантирующая, что ресурс используется ровно один раз — не копируется и не теряется","Числовые типы данных","Тип указателей"], a:1, exp:"Linear types (Rust — affine types): каждое значение используется ровно один раз. Позволяют системе типов гарантировать отсутствие use-after-free, double-free без GC. Основа системы ownership Rust." },
    ]
  }
};

// ============================================================
// STATE
// ============================================================
let state = {
  topic: null,
  difficulty: null,
  count: 10,
  questions: [],
  current: 0,
  correct: 0,
  wrong: 0,
  startTime: 0,
  answered: []
};

// ============================================================
// INIT
// ============================================================
function init() {
  // Render topics
  const grid = document.getElementById('topic-grid');
  Object.entries(TOPICS).forEach(([key, t]) => {
    const total = t.questions.length;
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.dataset.key = key;
    btn.innerHTML = `<span class="topic-icon">${t.icon}</span>
      <div class="topic-info">
        <div class="topic-name">${t.name}</div>
        <div class="topic-count">${total} вопросов</div>
      </div>`;
    btn.onclick = () => {
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.topic = key;
      checkReady();
    };
    grid.appendChild(btn);
  });

  // Difficulty
  document.querySelectorAll('.diff-btn[data-diff]').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.diff-btn[data-diff]').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.difficulty = btn.dataset.diff;
      checkReady();
    };
  });

  // Count
  document.querySelectorAll('.diff-btn[data-count]').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.diff-btn[data-count]').forEach(b => {
        b.style.borderColor = ''; b.style.color = '';
        b.classList.remove('selected');
      });
      btn.style.borderColor = 'var(--accent)';
      btn.style.color = 'var(--accent)';
      state.count = btn.dataset.count === 'all' ? 999 : parseInt(btn.dataset.count);
    };
  });

  document.getElementById('btn-start').onclick = startQuiz;
  document.getElementById('btn-explain').onclick = fetchExplanation;
  document.getElementById('btn-next').onclick = nextQuestion;
  document.getElementById('btn-retry').onclick = () => startQuiz();
  document.getElementById('btn-home').onclick = goHome;
}

function checkReady() {
  document.getElementById('btn-start').disabled = !(state.topic && state.difficulty);
}

// ============================================================
// QUIZ LOGIC
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const topicData = TOPICS[state.topic];
  let pool = topicData.questions.filter(q => q.d === state.difficulty);
  if (pool.length === 0) pool = topicData.questions;
  pool = shuffle(pool);
  state.questions = pool.slice(0, Math.min(state.count, pool.length));
  state.current = 0;
  state.correct = 0;
  state.wrong = 0;state.startTime = Date.now();
  state.answered = [];

  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.current];
  const total = state.questions.length;

  document.getElementById('q-counter').textContent = `Вопрос ${state.current + 1} / ${total}`;
  document.getElementById('live-correct').textContent = `✓ ${state.correct}`;
  document.getElementById('live-wrong').textContent = `✗ ${state.wrong}`;
  document.getElementById('progress-bar').style.width = `${(state.current / total) * 100}%`;

  const diffBadge = `<span class="badge badge-${q.d}">${{easy:'Лёгкий',medium:'Средний',hard:'Сложный'}[q.d]}</span>`;
  document.getElementById('question-text').innerHTML = q.q + diffBadge;

  const opts = document.getElementById('options-list');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    opts.appendChild(btn);
  });

  document.getElementById('btn-explain').style.display = 'none';
  document.getElementById('explanation-box').classList.remove('visible');
  document.getElementById('explanation-box').innerHTML = '';
  document.getElementById('btn-next').classList.remove('visible');
}

function selectAnswer(idx, btn) {
  const q = state.questions[state.current];
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  const card = document.getElementById('question-card');

  if (idx === q.a) {
    btn.classList.add('correct');
    state.correct++;
    card.classList.add('flash-correct');
    showToast('✓ Верно!');
    state.answered.push({ q: q.q, ok: true });
  } else {
    btn.classList.add('wrong');
    allBtns[q.a].classList.add('correct');
    state.wrong++;
    card.classList.add('flash-wrong');
    showToast('✗ Неверно');
    state.answered.push({ q: q.q, ok: false, correct: q.opts[q.a] });
  }

  setTimeout(() => card.classList.remove('flash-correct', 'flash-wrong'), 500);

  document.getElementById('btn-explain').style.display = 'inline-block';
  document.getElementById('btn-next').classList.add('visible');
  document.getElementById('btn-next').textContent =
    state.current + 1 < state.questions.length ? 'Следующий вопрос →' : 'Завершить тест →';
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ============================================================
// EXPLANATION via Anthropic API
// ============================================================
async function fetchExplanation() {
  const q = state.questions[state.current];
  const box = document.getElementById('explanation-box');
  box.classList.add('visible');
  box.innerHTML = '<div class="loading-text"><div class="spinner"></div> Генерирую объяснение...</div>';
  document.getElementById('btn-explain').disabled = true;

  // Use built-in explanation if available as fallback
  const fallback = q.exp || '';

  try {
    const prompt = `Объясни кратко и понятно (3-4 предложения) правильный ответ на вопрос по информатике:
Вопрос: ${q.q}
Правильный ответ: ${q.opts[q.a]}
Дай чёткое техническое объяснение на русском языке, без лишних слов.`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await resp.json();
    const text = data.content?.map(c => c.text || '').join('') || fallback;
    box.innerHTML = `<strong style="color:var(--accent2)">💡 Объяснение:</strong><br>${text}`;
  } catch (e) {box.innerHTML = `<strong style="color:var(--accent2)">💡 Объяснение:</strong><br>${fallback}`;
  }

  document.getElementById('btn-explain').disabled = false;
}

// ============================================================
// RESULTS
// ============================================================
function showResults() {
  const total = state.questions.length;
  const pct = Math.round((state.correct / total) * 100);
  const elapsed = Math.round((Date.now() - state.startTime) / 1000);

  document.getElementById('score-circle').style.setProperty('--pct', pct);
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('stat-correct').textContent = state.correct;
  document.getElementById('stat-wrong').textContent = state.wrong;
  document.getElementById('stat-time').textContent = elapsed < 60
    ? elapsed + 'с'
    : Math.floor(elapsed/60) + 'м ' + (elapsed%60) + 'с';

  let grade, sub;
  if (pct >= 90) { grade = '🏆 Отлично!'; sub = 'Превосходный результат!'; }
  else if (pct >= 75) { grade = '⭐ Хорошо!'; sub = 'Уверенные знания темы.'; }
  else if (pct >= 50) { grade = '📚 Неплохо'; sub = 'Есть пробелы для изучения.'; }
  else { grade = '🔄 Нужно повторить'; sub = 'Рекомендуется изучить тему.'; }

  document.getElementById('results-grade').textContent = grade;
  document.getElementById('results-subtitle').textContent = sub;

  // Recommendations
  const recs = getRecommendations(pct, state.difficulty, state.topic);
  const recBlock = document.getElementById('recommendations');
  recBlock.innerHTML = `<h3>// Рекомендации</h3>` +
    recs.map(r => `<div class="rec-item">${r}</div>`).join('');

  // Answered list
  const listBody = document.getElementById('answered-list-body');
  listBody.innerHTML = state.answered.map((a, i) => `
    <div class="answered-item ${a.ok ? 'ok' : 'fail'}">
      <span class="tag">${a.ok ? 'OK' : 'ERR'}</span>
      <span class="q-text">${i+1}. ${a.q.substring(0,80)}${a.q.length>80?'...':''}</span>
    </div>
  `).join('');

  showScreen('screen-results');
  document.getElementById('progress-bar').style.width = '100%';
}

function getRecommendations(pct, diff, topic) {
  const topicName = TOPICS[topic]?.name || topic;
  const recs = [];
  if (pct < 50) {
    recs.push(`Изучите основы темы «${topicName}» — начните с учебников или видеокурсов.`);
    recs.push('Повторите лёгкий уровень несколько раз до уверенного результата (80%+).');
  } else if (pct < 75) {
    recs.push(`Хорошая база по теме «${topicName}»! Проработайте вопросы, где допустили ошибки.`);
    if (diff === 'easy') recs.push('Попробуйте средний уровень сложности для закрепления.');
    if (diff === 'medium') recs.push('Изучите сложные случаи и граничные ситуации по теме.');
  } else if (pct < 90) {
    recs.push(`Отличные знания «${topicName}»! Осталось закрыть небольшие пробелы.`);
    if (diff !== 'hard') recs.push('Попробуйте сложный уровень для углублённого изучения.');
  } else {
    recs.push(`Превосходное знание «${topicName}»! Попробуйте другие темы.`);
    recs.push('Закрепляйте знания на практике: решайте задачи на LeetCode/Codeforces.');
  }
  recs.push('Используйте flashcards для повторения сложных концепций через интервалы.');
  return recs;
}

// ============================================================
// UTILS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goHome() {
  state.topic = null;
  state.difficulty = null;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.diff-btn[data-diff]').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-start').disabled = true;
  showScreen('screen-setup');
}

let toastTimer;
function showToast(msg) {const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

init();
</script>

</body>
</html>
